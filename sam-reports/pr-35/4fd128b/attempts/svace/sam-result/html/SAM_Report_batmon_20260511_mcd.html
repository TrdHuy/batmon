<script>
    let sourcePath = '/home/huy/Desktop/workspace/gitprojects/batmon/';

    let violations = [];

    let graphData = {};

    let mfsData = {};

    let graph = null;
    let $tableRelation = null;

    const drawTree = () => {
        var $tree = $('#file-tree');
        $tree.jstree({
            core: {
                data: {"text": " (0)", "fullpath": null, "filename": "", "type": "file", "state": {"opened": true}, "children": []},
                themes: {
                    responsive: false
                }
            },
            types: {
                default: {
                    icon: 'ki-outline ki-folder text-warning'
                },
                file: {
                    icon: 'ki-outline ki-file text-info'
                }
            },
            plugins: ['types', 'sort'],
            sort: function(a, b) {
                a1 = this.get_node(a);
                b1 = this.get_node(b);
                if (a1.icon == b1.icon) {
                    return (a1.text > b1.text) ? 1 : -1;
                } else {
                    return (a1.icon < b1.icon) ? 1 : -1;
                }
            }
        });
        return $tree;
    };

    const addTreeClickEvent = (tree, table) => {
        tree.on('changed.jstree', function (e, data) {
            $('#card-table').toggleClass('flipped', false);
            const selectedNode = data.node.original.fullpath
            const filteredList = violations.filter(
                item => (sourcePath + item.fullpath).replace('//', '/').includes(selectedNode)
            )
            table.clear().rows.add(filteredList).draw();
        });
    }

    const drawTable = (id, callback) => {
        return $(document.querySelector('#' + id)).DataTable({
            'data': violations,
            'columns': [{
                render: function (data, type, row) {
                    return `<div class="text-dark fw-bold">${row.cycle_index}</div>`;
                }
            }, {
                render: function (data, type, row) {
                    return `<div class="text-dark fw-bold">${row.fullpath}</div>`;
                }
            }, {
                render: function (data, type, row) {
                    return `<div class="text-dark fw-bold">${row.relation_count}</div>`;
                }
            }, {
                render: function (data, type, row) {
                    return `<div class="d-flex flex-row">
                                <div class="d-flex">
                                    <span class="badge badge-light-danger me-4 align-self-center align-middle">${row.score_penalty}</span>
                                </div>
                                <div class="d-flex flex-grow-1">
                                    <span onclick="drawMCDGraph('${row.cycle_index}','${row.fullpath}')"
                                        class="btn btn-sm btn-outline btn-outline-dark btn-icon-primary btn-text-dark float-end p-2">
                                        <i class="ki-outline ki-chart-pie-4 fs-1 p-0"></i>
                                    </span>
                                </div>
                            </div>`;
                }
            }]
        });
    }

    const addBackButtonEvent = () => {
        $('[name="button-back"]').on('click', () => {
            $('#card-table').toggleClass('flipped', false);
        });
    }

    const drawMCDGraph = (cycleIndex, moduleName) => {
        if (graph != null) {
            graph.destroy();
        }

        $('#span-module').text(moduleName);
        $('#card-table').toggleClass('flipped', true);
        let data = graphData[cycleIndex]
        graph = new Graph("div-graph", data.nodes, data.edges);
        graph.draw();

        drawMCDRelation(cycleIndex)
    }

    function getCommonParentPath(filePaths) {
        const components = filePaths.map(filePath => filePath.split(/[\\/]/));
        const minLength = Math.min(...components.map(componentArray => componentArray.length));
        const commonComponents = [];
        for (let i = 0; i < minLength; i++) {
            const currentComponent = components[0][i];
            if (components.every(componentArray => componentArray[i] === currentComponent)) {
                commonComponents.push(currentComponent);
            } else {
                break;
            }
        }

        return commonComponents.join('/');
    }


    const drawMCDRelation = (cycleIndex) => {
        if ($tableRelation != null) {
            $tableRelation.destroy();
        }

        let filepaths = []
        Object.keys(mfsData[cycleIndex]).forEach((key) => {
            filepaths.push(key.split('>')[0])
            filepaths.push(key.split('>')[1])
        })
        let commonPath = getCommonParentPath(filepaths)

        let relations = []
        let index = 0;
        Object.keys(mfsData[cycleIndex]).forEach((key) => {
            let mfs = mfsData[cycleIndex][key];
            let fileFrom = mfs['file_from'].replace(commonPath, '');
            let fileTo = mfs['file_to'].replace(commonPath, '');
            mfs.relations.forEach((relation) => {
                relations.push({
                    index: ++index,
                    relationType: relation['type'],
                    fileFrom: fileFrom,
                    fileTo: fileTo,
                    lineFrom: relation['line_from'],
                    lineTo: relation['line_to'],
                    fromEntity: relation['entity_from'],
                    toEntity: relation['entity_to'],
                })
            })
        })

        $('#span-cycle').text(cycleIndex);

        $tableRelation = $(document.querySelector('#table-relations')).DataTable({
            'data': relations,
            "dom":
                `<'row mb-2'
                <'col-sm-6 d-flex align-items-center justify-conten-start dt-toolbar'l>
                <'col-sm-6 d-flex align-items-center justify-content-end dt-toolbar'f>
                >
		        <'table-responsive'tr>
		        <'row'
		        <'col-sm-12 col-md-5 d-flex align-items-center justify-content-center justify-content-md-start'i>
		        <'col-sm-12 col-md-7 d-flex align-items-center justify-content-center justify-content-md-end'p>
		        >`,
            'columns': [{
                render: function (data, type, row) {
                    return `<div >${row.index}</div>`;
                }
            }, {
                render: function (data, type, row) {
                    return `<div class="fw-bold">${row.relationType}</div>`;
                }
            }, {
                render: function (data, type, row) {
                    return `<div class="fs-7">${row.fileFrom}:${row.lineFrom}</div>`;
                }
            }, {
                render: function (data, type, row) {
                    return `<div class="fs-7">${row.fromEntity}</div>`;
                }
            }, {
                render: function (data, type, row) {
                    return `<div class="fs-7">${row.fileTo}:${row.lineTo}</div>`;
                }
            }, {
                render: function (data, type, row) {
                    return `<div class="fs-7">${row.toEntity}</div>`;
                }
            }]
        });
    }

    addBackButtonEvent();

    var $tree = drawTree();
    var $table = drawTable('table-metric-violations');
    addTreeClickEvent($tree, $table);
</script>
