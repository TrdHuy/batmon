<script>
    let violations = [];
    const drawTree = () => {
        var $tree = $('#file-tree');
        $tree.jstree({
            core: {
                data: {"text": " (0)", "fullpath": null, "filename": "", "type": "file", "state": {"opened": true}, "children": []},
                themes: {
                    responsive: false
                }
            },
            types: {
                default: {
                    icon: 'ki-outline ki-folder text-warning'
                },
                file: {
                    icon: 'ki-outline ki-file text-info'
                }
            },
            plugins: ['types', 'sort'],
            sort: function(a, b) {
                a1 = this.get_node(a);
                b1 = this.get_node(b);
                if (a1.icon == b1.icon) {
                    return (a1.text > b1.text) ? 1 : -1;
                } else {
                    return (a1.icon < b1.icon) ? 1 : -1;
                }
            }
        });
        return $tree;
    };

    const drawTable = () => {
        return $(document.querySelector('#table-metric-violations')).DataTable({
            'data': violations,
            'columns': [{
                render: function (data, type, row) {
                    return `<div class="mb-1 text-dark fw-bold">
                                <p class="mb-0">${row.entity_name}</p>
                                <p class="mb-0 fs-7 text-muted fw-bold">
                                    ${row.file_name}${row.line_number ? ':' + row.line_number : ''}
                                    <i onclick="copyPath('${row.fullpath}')" class="cursor-pointer ki-outline ki-copy text-success"></i>
                                </p>
                            </div>`;
                }
            }, {
                render: function (data, type, row) {
                    return `<div class="text-danger fw-bold text-center">${row.value}</div>`;
                }
            }, {
                render: function (data, type, row) {
                    return `<span class="badge badge-light-danger">${row.score_penalty}</span>`;
                }
            }]
        });
    }

    const addTreeClickEvent = (tree, table) => {
        tree.on('changed.jstree', function (e, data) {
            const selectedNode = data.node.original.fullpath
            const filteredList = violations.filter(item => item.fullpath.includes(selectedNode))
            table.clear().rows.add(filteredList).draw();
        });
    }

    var $tree = drawTree();
    var $table = drawTable();
    addTreeClickEvent($tree, $table);

    const copyPath = (path) => {
        var $temp = $("<input>");
        $("body").append($temp);
        $temp.val(path).select();
        document.execCommand("copy");
        $temp.remove();
        alert("Copied.");
    }

</script>
